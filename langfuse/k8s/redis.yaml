# =============================================================================
# Redis Deployment + Service for Langfuse v4
# Used for event queuing and caching (API keys, prompts).
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: langfuse-redis
  namespace: langfuse
  labels:
    app: langfuse-redis
spec:
  type: ClusterIP
  selector:
    app: langfuse-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-redis
  namespace: langfuse
  labels:
    app: langfuse-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langfuse-redis
  template:
    metadata:
      labels:
        app: langfuse-redis
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: cloud.google.com/gke-nodepool
                    operator: NotIn
                    values:
                      - gpu-pool

      containers:
        - name: redis
          image: redis:7
          command:
            - redis-server
            - --requirepass
            - myredissecret
            - --maxmemory-policy
            - noeviction
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 30
