# =============================================================================
# MinIO StatefulSet + Service for Langfuse v4
# S3-compatible object storage for events, media, and batch exports.
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: langfuse-minio
  namespace: langfuse
  labels:
    app: langfuse-minio
spec:
  type: ClusterIP
  selector:
    app: langfuse-minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: langfuse-minio
  namespace: langfuse
  labels:
    app: langfuse-minio
spec:
  serviceName: langfuse-minio
  replicas: 1
  selector:
    matchLabels:
      app: langfuse-minio
  template:
    metadata:
      labels:
        app: langfuse-minio
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: cloud.google.com/gke-nodepool
                    operator: NotIn
                    values:
                      - gpu-pool

      containers:
        - name: minio
          image: minio/minio:latest
          command:
            - sh
            - -c
            - mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              value: minio
            - name: MINIO_ROOT_PASSWORD
              value: miniosecret
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: minio-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: minio-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
