apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: agent-service-monitor
  namespace: agent
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - agent
  selector:
    matchLabels:
      app: agent-server
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
