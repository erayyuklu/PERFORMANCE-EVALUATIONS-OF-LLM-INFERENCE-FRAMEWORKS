apiVersion: v1
kind: Service
metadata:
  name: vllm-service
  namespace: vllm
  labels:
    app: vllm-server
  annotations:
    cloud.google.com/load-balancer-type: "External"
spec:
  type: LoadBalancer
  selector:
    app: vllm-server
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
