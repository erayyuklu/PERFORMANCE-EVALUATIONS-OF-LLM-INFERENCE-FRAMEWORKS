apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-worker
  namespace: locust
  labels:
    app: locust
    role: worker
spec:
  replicas: 2   # increase for higher concurrency headroom
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: locust
      role: worker
  template:
    metadata:
      labels:
        app: locust
        role: worker
    spec:
      # -----------------------------------------------------------------------
      # Isolation: same as master — no GPU toleration → CPU nodes only
      # -----------------------------------------------------------------------
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: cloud.google.com/gke-nodepool
                    operator: NotIn
                    values:
                      - gpu-pool

      containers:
        - name: locust-worker
          image: europe-west3-docker.pkg.dev/cmpe492gcp3/locust/locust-vllm:latest
          imagePullPolicy: Always
          args:
            - "--worker"
            - "--master-host=locust-master"
            - "-f"
            - "/locust/locustfile.py"
          volumeMounts:
            - name: worker-artifacts
              mountPath: /locust-artifacts
          env:
            - name: VLLM_MODEL_NAME
              valueFrom:
                configMapKeyRef:
                  name: locust-config
                  key: VLLM_MODEL_NAME
            - name: VLLM_MAX_TOKENS
              valueFrom:
                configMapKeyRef:
                  name: locust-config
                  key: VLLM_MAX_TOKENS
            - name: VLLM_TEMPERATURE
              valueFrom:
                configMapKeyRef:
                  name: locust-config
                  key: VLLM_TEMPERATURE
            - name: VLLM_REQUEST_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: locust-config
                  key: VLLM_REQUEST_TIMEOUT
            - name: DATASET_TYPE
              valueFrom:
                configMapKeyRef:
                  name: locust-config
                  key: DATASET_TYPE
            - name: SHAREGPT_PATH
              valueFrom:
                configMapKeyRef:
                  name: locust-config
                  key: SHAREGPT_PATH
            - name: SHAREGPT_MIN_TURNS
              valueFrom:
                configMapKeyRef:
                  name: locust-config
                  key: SHAREGPT_MIN_TURNS
            - name: CUSTOM_DATASET_PATH
              valueFrom:
                configMapKeyRef:
                  name: locust-config
                  key: CUSTOM_DATASET_PATH
            - name: VLLM_PROMPT_LEN
              valueFrom:
                configMapKeyRef:
                  name: locust-config
                  key: VLLM_PROMPT_LEN
            - name: VLLM_USER_PROFILE
              valueFrom:
                configMapKeyRef:
                  name: locust-config
                  key: VLLM_USER_PROFILE
            - name: LOCUST_ARTIFACTS_DIR
              valueFrom:
                configMapKeyRef:
                  name: locust-config
                  key: LOCUST_ARTIFACTS_DIR
            - name: VLLM_ENABLE_THINKING
              valueFrom:
                configMapKeyRef:
                  name: locust-config
                  key: VLLM_ENABLE_THINKING
          resources:
            requests:
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: worker-artifacts
          emptyDir: {}
