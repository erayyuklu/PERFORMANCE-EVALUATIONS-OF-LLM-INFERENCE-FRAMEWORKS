apiVersion: v1
kind: Service
metadata:
  name: locust-master
  namespace: locust
  labels:
    app: locust
    role: master
spec:
  type: ClusterIP
  selector:
    app: locust
    role: master
  ports:
    - name: web
      port: 8089
      targetPort: 8089
    - name: worker-comm-1
      port: 5557
      targetPort: 5557
    - name: worker-comm-2
      port: 5558
      targetPort: 5558
    - name: metrics
      port: 9646
      targetPort: 9646
