apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-tools-server
  namespace: mock-tools
  labels:
    app: mock-tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-tools
  template:
    metadata:
      labels:
        app: mock-tools
    spec:
      # Stay on CPU node pool — no GPU toleration
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: cloud.google.com/gke-nodepool
                    operator: NotIn
                    values:
                      - gpu-pool

      containers:
        - name: mock-tools
          image: europe-west3-docker.pkg.dev/PROJECT_ID/mock-tools/mock-tools-server:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
