apiVersion: v1
kind: ConfigMap
metadata:
  name: locust-config
  namespace: locust
data:
  # --- vLLM target ---------------------------------------------------------
  # Inside the cluster, Locust reaches vLLM via the ClusterIP DNS name.
  # This is overridden by the LOCUST_HOST env var in the Deployment.
  VLLM_TARGET_HOST: "http://vllm-service.vllm.svc.cluster.local"

  # --- Locust test settings ------------------------------------------------
  VLLM_MODEL_NAME: "deepseek-ai/DeepSeek-R1-Distill-Qwen-7B"
  VLLM_MAX_TOKENS: "256"
  VLLM_DATASET: "/locust/prompts/dataset.json"
  VLLM_PROMPT_LEN: "all"

  # --- Prometheus exporter -------------------------------------------------
  # Port on which locust-plugins PrometheusListener serves /metrics
  LOCUST_PROMETHEUS_PORT: "9646"
