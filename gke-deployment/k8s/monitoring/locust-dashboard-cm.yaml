apiVersion: v1
kind: ConfigMap
metadata:
  name: locust-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Load Testing"
data:
  locust-dashboard.json: |
    {
      "title": "Locust Load Test",
      "uid": "locust-load-test",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "10s",
      "time": { "from": "now-30m", "to": "now" },
      "tags": ["locust", "load-test", "vllm"],
      "panels": [
        {
          "id": 1,
          "title": "Active Users",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 10 },
                  { "color": "red", "value": 50 }
                ]
              },
              "unit": "none"
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "graphMode": "area", "colorMode": "background" },
          "targets": [
            {
              "expr": "locust_users",
              "legendFormat": "Users"
            }
          ]
        },
        {
          "id": 2,
          "title": "Requests / sec",
          "type": "stat",
          "gridPos": { "x": 4, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "reqps", "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null }
              ]}
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "graphMode": "area", "colorMode": "background" },
          "targets": [
            {
              "expr": "sum(rate(locust_requests_total[1m]))",
              "legendFormat": "RPS"
            }
          ]
        },
        {
          "id": 3,
          "title": "Failure Rate",
          "type": "stat",
          "gridPos": { "x": 8, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "percentunit",
              "color": { "mode": "thresholds" },
              "thresholds": { "mode": "absolute", "steps": [
                { "color": "green", "value": null },
                { "color": "yellow", "value": 0.01 },
                { "color": "red", "value": 0.05 }
              ]}
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "graphMode": "area", "colorMode": "background" },
          "targets": [
            {
              "expr": "sum(rate(locust_requests_total{result=\"failure\"}[1m])) / sum(rate(locust_requests_total[1m]))",
              "legendFormat": "Failure %"
            }
          ]
        },
        {
          "id": 4,
          "title": "Response Time p50 / p95 / p99 (ms)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "ms", "custom": { "lineWidth": 2 } }
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(locust_response_time_seconds_bucket[1m])) by (le)) * 1000",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(locust_response_time_seconds_bucket[1m])) by (le)) * 1000",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(locust_response_time_seconds_bucket[1m])) by (le)) * 1000",
              "legendFormat": "p99"
            }
          ]
        },
        {
          "id": 5,
          "title": "Throughput — Requests/sec by Result",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "reqps", "custom": { "lineWidth": 2 } }
          },
          "targets": [
            {
              "expr": "sum(rate(locust_requests_total{result=\"success\"}[1m]))",
              "legendFormat": "Success RPS"
            },
            {
              "expr": "sum(rate(locust_requests_total{result=\"failure\"}[1m]))",
              "legendFormat": "Failure RPS"
            }
          ]
        },
        {
          "id": 6,
          "title": "Active Users Over Time",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "none", "custom": { "lineWidth": 2, "fillOpacity": 20 } }
          },
          "targets": [
            {
              "expr": "locust_users",
              "legendFormat": "Concurrent Users"
            }
          ]
        },
        {
          "id": 7,
          "title": "vLLM — TTFT p50 / p95 / p99 (ms)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "ms", "custom": { "lineWidth": 2 } }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(vllm:time_to_first_token_seconds_bucket[1m])) by (le)) * 1000",
              "legendFormat": "TTFT p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(vllm:time_to_first_token_seconds_bucket[1m])) by (le)) * 1000",
              "legendFormat": "TTFT p95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(vllm:time_to_first_token_seconds_bucket[1m])) by (le)) * 1000",
              "legendFormat": "TTFT p99"
            }
          ]
        },
        {
          "id": 8,
          "title": "vLLM — TPOT p50 / p95 / p99 (ms/token)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 12, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "ms", "custom": { "lineWidth": 2 } }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(vllm:time_per_output_token_seconds_bucket[1m])) by (le)) * 1000",
              "legendFormat": "TPOT p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(vllm:time_per_output_token_seconds_bucket[1m])) by (le)) * 1000",
              "legendFormat": "TPOT p95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(vllm:time_per_output_token_seconds_bucket[1m])) by (le)) * 1000",
              "legendFormat": "TPOT p99"
            }
          ]
        }
      ],
      "templating": {
        "list": []
      }
    }
